<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Progress Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="scoresTicker" class="scores-ticker" aria-label="Live sports scores">
      <div class="scores-ticker-label">🏈 Scores</div>
      <div class="scores-ticker-track" id="scoresTrack">
        <span class="scores-loading">Loading scores…</span>
      </div>
    </div>

    <main class="shell">
      <header class="page-header">
        <p class="tag">Weekly wins</p>
        <h1>Progress Tracker</h1>
        <p class="lead">Tap a day once your task is done. Watch the streaks grow!</p>
      </header>

      <div class="auth-bar" id="authBar"></div>

      <section id="board" class="board"></section>

      <footer class="page-footer">
        <button id="resetWeek" class="reset-btn" type="button">Reset this week</button>
        <button id="openSettings" class="reset-btn" type="button">Edit names &amp; tasks</button>
        <span class="week-label" id="weekLabel"></span>
      </footer>
    </main>

    <div id="celebration" class="celebration" aria-hidden="true">
      <div class="celebration-card">
        <div class="celebration-emoji" id="celebrationEmoji">🎉</div>
        <div class="celebration-text" id="celebrationText">Nice work!</div>
      </div>
    </div>
    <canvas id="confetti"></canvas>

    <div id="loginOverlay" class="login-overlay" aria-hidden="true">
      <form id="loginForm" class="login-card">
        <h2 class="login-title">Who's checking in?</h2>
        <label class="login-label" for="loginName">Name</label>
        <select id="loginName" class="login-select"></select>
        <label class="login-label" for="loginPin">PIN</label>
        <input id="loginPin" class="login-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off" />
        <p class="login-hint" id="loginHint">First time logging in? Just type a PIN to set it up.</p>
        <p class="login-error" id="loginError" role="alert"></p>
        <div class="login-actions">
          <button type="button" class="login-cancel" id="loginCancel">Cancel</button>
          <button type="submit" class="login-submit">Log in</button>
        </div>
      </form>
    </div>

    <div id="settingsOverlay" class="settings-overlay" aria-hidden="true">
      <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-header">
          <h2 id="settingsTitle">Edit names &amp; tasks</h2>
          <button id="closeSettings" class="icon-btn" type="button" aria-label="Close">✕</button>
        </div>
        <div id="settingsList" class="settings-list"></div>
        <button id="addPerson" class="add-btn" type="button">+ Add person</button>
        <div class="settings-footer">
          <button id="saveSettings" class="save-btn" type="button">Save</button>
        </div>
      </div>
    </div>

    <script src="scores.js"></script>
    <script src="app.js"></script>
  </body>
</html>
